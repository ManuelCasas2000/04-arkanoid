<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Arkanoid MVP</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        #gameContainer {
            position: relative;
            width: 800px;
            height: 600px;
            background: #000000;
            border: 3px solid #00d4ff;
            box-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        #startMenu, #levelSelectMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #startMenu.hidden, #levelSelectMenu.hidden {
            display: none;
        }

        #startMenu h1, #levelSelectMenu h1 {
            color: #00d4ff;
            font-size: 48px;
            margin-bottom: 40px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        #levelSelectMenu {
            display: none;
        }

        #levelSelectMenu h2 {
            color: #00d4ff;
            font-size: 36px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        #levelButtons {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
        }

        .level-button {
            padding: 20px 25px;
            font-size: 20px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            min-width: 80px;
        }

        .level-button:hover {
            background: #00ffff;
            transform: scale(1.1);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        #startMenu button,
        #pauseMenu button,
        #retryMenu button {
            padding: 15px 40px;
            font-size: 24px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #startMenu button:hover,
        #pauseMenu button:hover,
        #retryMenu button:hover {
            background: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        #pauseMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 50;
        }

        #pauseMenu.hidden {
            display: none;
        }

        #pauseMenu h2 {
            color: #00d4ff;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);
        }

        #pauseMenu p {
            color: #ffffff;
            font-size: 18px;
            margin-bottom: 30px;
        }

        #pauseButtons {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }

        #pauseButtons button {
            padding: 12px 30px;
            font-size: 18px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
            min-width: 180px;
        }

        #pauseButtons button:hover {
            background: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        #retryMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #retryMenu.hidden {
            display: none;
        }

        #retryMenu h2 {
            color: #ff4444;
            font-size: 48px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 68, 68, 0.8);
        }

        #retryMenu p {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        #levelCompleteMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #levelCompleteMenu.hidden {
            display: none;
        }

        #levelCompleteMenu h2 {
            color: #00ff00;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.8);
        }

        #levelCompleteMenu p {
            color: #ffffff;
            font-size: 24px;
            margin-bottom: 30px;
        }

        #levelCompleteMenu button {
            padding: 15px 40px;
            font-size: 24px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #levelCompleteMenu button:hover {
            background: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        #gameCompleteMenu {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        #gameCompleteMenu.hidden {
            display: none;
        }

        #gameCompleteMenu h2 {
            color: #ffff00;
            font-size: 48px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px rgba(255, 255, 0, 0.8);
        }

        #gameCompleteMenu p {
            color: #ffffff;
            font-size: 28px;
            margin-bottom: 30px;
        }

        #gameCompleteMenu button {
            padding: 15px 40px;
            font-size: 24px;
            background: #00d4ff;
            color: #1a1a2e;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #gameCompleteMenu button:hover {
            background: #00ffff;
            transform: scale(1.05);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.8);
        }

        #hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            color: #00d4ff;
            font-size: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            font-weight: bold;
        }

        #hud.hidden {
            display: none;
        }

        .hud-item {
            background: rgba(0, 212, 255, 0.2);
            padding: 8px 15px;
            border-radius: 3px;
        }

        #escHint {
            position: absolute;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: #aaaaaa;
            font-size: 14px;
            z-index: 10;
        }

        #escHint.hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="800" height="600"></canvas>

        <div id="startMenu">
            <h1>ARKANOID</h1>
            <button id="playButton">Jugar</button>
        </div>

        <div id="levelSelectMenu" class="hidden">
            <h2>Selecciona un Nivel</h2>
            <div id="levelButtons">
                <button class="level-button" data-level="1">Nivel 1</button>
                <button class="level-button" data-level="2">Nivel 2</button>
                <button class="level-button" data-level="3">Nivel 3</button>
                <button class="level-button" data-level="4">Nivel 4</button>
                <button class="level-button" data-level="5">Nivel 5</button>
            </div>
        </div>

        <div id="pauseMenu" class="hidden">
            <h2>PAUSA</h2>
            <p>Presiona ESC para reanudar</p>
            <div id="pauseButtons">
                <button id="resumeButton">Reanudar (ESC)</button>
                <button id="changeLevelButton">Cambiar Nivel</button>
            </div>
        </div>

        <div id="retryMenu" class="hidden">
            <h2>GAME OVER</h2>
            <p id="finalScore">Puntuación: 0</p>
            <button id="retryButton">Reintentar</button>
        </div>

        <div id="levelCompleteMenu" class="hidden">
            <h2 id="levelCompleteTitle">¡Nivel completado!</h2>
            <p id="levelCompleteScore">Puntuación: 0</p>
            <button id="continueButton">Continuar</button>
        </div>

        <div id="gameCompleteMenu" class="hidden">
            <h2>¡JUEGO COMPLETADO!</h2>
            <p id="gameCompleteScore">Puntuación Total: 0</p>
            <button id="menuButton">Volver al Menú</button>
        </div>

        <div id="hud">
            <div class="hud-item">Nivel: <span id="level">1</span></div>
            <div class="hud-item">Puntuación: <span id="score">0</span></div>
            <div class="hud-item">Vidas: <span id="lives">3</span></div>
        </div>

        <div id="escHint">Presiona ESC para pausar</div>
    </div>

    <script src="assets/spritesheet.js"></script>
    <script src="game.js"></script>
</body>
</html>
